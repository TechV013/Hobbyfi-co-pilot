name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hobbyfi
          POSTGRES_PASSWORD: hobbyfi_secret
          POSTGRES_DB: hobbyfi_copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U hobbyfi
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
      - run: npx tsx prisma/seed.ts
        env:
          DATABASE_URL: postgresql://hobbyfi:hobbyfi_secret@localhost:5432/hobbyfi_copilot
          JWT_SECRET: hobbyfi-ci-jwt-secret
          GOOGLE_GENERATIVE_AI_API_KEY: skip
