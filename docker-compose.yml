version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hobbyfi-postgres
    environment:
      POSTGRES_USER: hobbyfi
      POSTGRES_PASSWORD: hobbyfi_secret
      POSTGRES_DB: hobbyfi_copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hobbyfi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hobbyfi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
